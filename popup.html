<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timed Lyrics Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #0f0f15;
      --bg-card: rgba(22, 22, 32, 0.85);
      --bg-input: rgba(30, 30, 45, 0.7);
      --border: rgba(255, 255, 255, 0.06);
      --border-focus: rgba(30, 215, 96, 0.4);
      --text-primary: #e8e8ed;
      --text-secondary: #8b8b9e;
      --text-muted: #555568;
      --accent: #1db954;
      --accent-hover: #1ed760;
      --accent-glow: rgba(30, 215, 96, 0.15);
      --danger: #e74c5e;
      --danger-hover: #ff5a6e;
      --success: #28d67a;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.4);
      --shadow-glow: 0 0 24px rgba(30, 215, 96, 0.15);
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 400px;
      min-height: 580px;
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header { padding: 20px 20px 0; text-align: center; position: relative; display: flex; align-items: center; justify-content: center; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent) 0%, #17a34a 100%); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-glow); }
    .logo-icon svg { width: 18px; height: 18px; fill: white; }
    .logo h1 { font-size: 16px; font-weight: 800; background: linear-gradient(135deg, #fff 0%, #8b8b9e 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    
    .settings-toggle { position: absolute; top: 15px; right: 15px; background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 8px; transition: color 0.2s; }
    .settings-toggle:hover { color: var(--text-primary); }

    /* ── Track Info ── */
    .track-info { margin: 24px 20px 0; padding: 14px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); backdrop-filter: blur(12px); }
    .label { font-size: 9px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; }
    .track-title { font-size: 14px; font-weight: 700; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .track-artist { font-size: 12px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Settings Panel (Hidden) ── */
    #settingsPanel { display: none; padding: 16px 20px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); }
    .settings-title { font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 12px; }
    .input-group { margin-bottom: 10px; }
    .input-label { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; display: block; }
    .input-field { width: 100%; padding: 8px 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); color: #fff; font-size: 11px; outline: none; }
    .input-field:focus { border-color: var(--accent); }

    /* ── Actions ── */
    .actions { padding: 16px 20px; }
    .btn { width: 100%; padding: 12px 16px; border: none; border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; transition: all var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: var(--shadow-glow); }
    .btn-ai { background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%); color: #fff; display: none; }
    .btn-ai:hover { transform: translateY(-1px); box-shadow: 0 0 20px rgba(124, 58, 237, 0.3); }

    .btn-row { display: flex; gap: 8px; }
    .btn-secondary { flex: 1; background: var(--bg-input); color: var(--text-secondary); border: 1px solid var(--border); font-size: 11px; }
    .btn-secondary:hover { border-color: var(--accent); color: #fff; }

    /* ── AI Features Section ── */
    .ai-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: rgba(124, 58, 237, 0.15); color: #a78bfa; border-radius: 4px; font-size: 9px; font-weight: 700; margin-left: 8px; }

    /* ── Output ── */
    .output-section { padding: 0 20px 20px; }
    .output-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
    .output-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .lyrics-output { width: 100%; height: 220px; padding: 14px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.6; resize: none; outline: none; }

    /* ── Status Bar ── */
    .status-bar { padding: 10px 20px; text-align: center; font-size: 11px; color: var(--text-muted); border-top: 1px solid var(--border); background: var(--bg-secondary); }
    .status-bar.working { color: #a78bfa; }
    
    .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 8px; }
    .status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s ease-in-out infinite; }
    .status-dot.inactive { background: var(--text-muted); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.1); border-top-color: currentColor; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
      </div>
      <h1>Timed Lyrics</h1>
    </div>
    <button class="settings-toggle" id="settingsBtn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <div id="settingsPanel">
      <div class="settings-title">AI Settings</div>
      <div class="input-group">
          <label class="input-label">OpenRouter API Key</label>
          <input type="password" id="apiKeyInput" class="input-field" placeholder="sk-or-v1-...">
      </div>
      <div class="input-group">
          <label class="input-label">Model ID (Optional)</label>
          <input type="text" id="modelIdInput" class="input-field" placeholder="openrouter/auto">
      </div>
      <p style="font-size: 10px; color: var(--text-muted);">Key is stored locally. Default is "openrouter/auto".</p>
  </div>

  <div class="track-info">
    <div class="label"><span class="status-dot inactive" id="statusDot"></span>Now Playing <div id="aiLabel" class="ai-badge hidden">AI READY</div></div>
    <div class="track-title" id="trackTitle">Detecting track...</div>
    <div class="track-artist" id="trackArtist">—</div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="generateBtn">Generate Sync Lyrics</button>
    <button class="btn btn-ai" id="aiCorrectBtn">AI Fix Spelling & Context</button>
    <div class="btn-row">
      <button class="btn btn-secondary" id="copyBtn" disabled>Copy LRC</button>
      <button class="btn btn-secondary" id="downloadBtn" disabled>Download</button>
    </div>
  </div>

  <div class="output-section">
    <div class="output-header"><div class="output-label">Lyrics Output</div></div>
    <textarea class="lyrics-output" id="lyricsOutput" placeholder="Play a song and click 'Generate'..." readonly></textarea>
  </div>

  <div class="status-bar" id="statusBar">Ready</div>
  <script src="popup.js"></script>
</body>
</html>
